services:
  db:
    image: postgres:16-alpine
    container_name: sonarqube_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_change_me
      POSTGRES_DB: sonarqube
    command:
     - postgres
     - -c
     - max_connections=80
     - -c
     - shared_buffers=256MB
     - -c
     - work_mem=4MB
     - -c
     - maintenance_work_mem=64MB
     - -c
     - effective_cache_size=512MB
    volumes:
     - ./postgresql_data:/var/lib/postgresql/data
    healthcheck:
     test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
     interval: 10s
     timeout: 5s
     retries: 10
    cpus: "1.0"
    mem_limit: 768m
    mem_reservation: 256m

  sonarqube:
    image: sonarqube:26.6.0.123539-community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
     db:
        condition: service_healthy
    environment:
     SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonarqube
     SONAR_JDBC_USERNAME: sonar
     SONAR_JDBC_PASSWORD: sonar_change_me

     # Ajuste para carga baja: 1 usuario dashboard y hasta 5 escaneos en cola.
     SONAR_WEB_JAVAOPTS: -Xms256m -Xmx512m -XX:+HeapDumpOnOutOfMemoryError
     SONAR_CE_JAVAOPTS: -Xms512m -Xmx1024m -XX:+HeapDumpOnOutOfMemoryError
     SONAR_SEARCH_JAVAOPTS: -Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m -XX:+HeapDumpOnOutOfMemoryError
     SONAR_CE_WORKERCOUNT: 2
    ports:
     - "9000:9000"
    ulimits:
     nofile:
        soft: 65536
        hard: 65536
    volumes:
     - ./sonarqube_data:/opt/sonarqube/data
     - ./sonarqube_logs:/opt/sonarqube/logs
     - ./sonarqube_extensions:/opt/sonarqube/extensions
    cpus: "2.0"
    mem_limit: 3g
    mem_reservation: 2g
